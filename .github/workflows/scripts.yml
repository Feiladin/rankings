# 起点排行榜定时抓取
#
# 每周一 08:00 UTC（北京时间 16:00）运行爬虫，自动提交更新后的排行数据。
# 数据文件 docs/rankings.json 供 App 端通过 raw.githubusercontent.com 拉取。

name: Fetch Qidian Rankings

on:
  schedule:
    # 每周一 08:00 UTC
    - cron: "0 8 * * 1"
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run ranking scraper
        run: python3 scripts/fetch-rankings.py --output docs/rankings.json --limit 10

      - name: Commit and push if changed
        run: |
          git config user.name "Qidian Bot"
          git config user.email "bot@qidian-reader.app"
          git add docs/rankings.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "更新起点排行榜数据（$(date +%Y-%m-%d)）"
            git push
          fi
